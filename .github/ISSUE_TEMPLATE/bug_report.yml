name: Bug Report
description: Report a problem or unexpected behaviour in the Pine Script VS Code extension.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the behaviour.
      placeholder: |
        1. Open a `.pine` file
        2. Type '…'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension version
      description: Found in the Extensions panel (e.g. `1.2.3`).
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      description: Found in **Help → About** (e.g. `1.89.0`).
      placeholder: "1.89.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help (logs, related issues, etc.).
